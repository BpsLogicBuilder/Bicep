on: [workflow_dispatch]
name: Deploy ACR

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:

      # Checkout code
    - uses: actions/checkout@v4

      # Log into Azure
    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.ARM_DEPLOYER_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy Acr Bicep file
    - name: Deploy ACR
      uses: azure/arm-deploy@v1
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION }}
        resourceGroupName: ${{ secrets.AZURE_RG }}
        template: ./acr/acr.bicep
        failOnStdErr: false

    - name: Deploy Web App
      uses: azure/arm-deploy@v1
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION }}
        resourceGroupName: ${{ secrets.AZURE_RG }}
        template: ./webapp-docker/webapp-docker.bicep
        failOnStdErr: false

    - name: Assign Acr Pull Role to Web App
      uses: azure/arm-deploy@v1
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION }}
        resourceGroupName: ${{ secrets.AZURE_RG }}
        template: ./webapp-docker/assign-acr-pull-to-webapp.bicep
        failOnStdErr: false